server:
  port: 8092

spring:
  application:
    name: ms-entrenadores
  datasource:

    url: jdbc:mysql://host.docker.internal:3307/db_gym_entrenadores?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:

      ddl-auto: update
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    service-url:

      defaultZone: http://host.docker.internal:8761/eureka/
  instance:
    prefer-ip-address: true

ms:
  clases:

    url: http://host.docker.internal:8082

jwt:
  secret: TXV5TGdyYVNlZ3VyYVBhcmFHeW1TeW5jMjAyNkNvbnRyYXNlbmE=

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html