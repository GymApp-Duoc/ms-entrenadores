server:
  port: 8080

spring:
  application:
    name: ms-entrenadores
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false


jwt:
  secret: ${JWT_SECRET:estaEsUnaClaveSecretaTemporalParaQueArranque12345}

ms:
  clases:
    url: ${MS_CLASES_URL:http://localhost:8080}